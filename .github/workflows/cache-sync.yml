name: Sync FAISS Cache

# Triggers:
# 1. After a PR is merged (push to main/master)
# 2. Manual trigger for first-time bootstrap (workflow_dispatch)
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allows manual trigger from Actions tab

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore existing FAISS cache (if any) before running the sync
      - name: Restore FAISS Cache
        uses: actions/cache@v4
        with:
          path: .faiss_cache
          key: faiss-repo-cache-${{ github.repository }}
          restore-keys: |
            faiss-repo-cache-

      - name: Sync Cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_MODE: sync
        run: python sync_cache.py
